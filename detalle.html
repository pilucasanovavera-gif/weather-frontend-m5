<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clima360 | Detalle del Pronóstico</title>

    <link rel="stylesheet" href="./assets/css/main.css" />
  </head>

  <body>
    <header class="main-header">
      <nav class="navbar navbar-expand-lg navbar-dark main-nav">
        <div class="container">
          <a class="navbar-brand main-nav__logo" href="index.html"
            >🌎 SkyWeather</a
          >

          <a
            href="index.html"
            class="btn btn-outline-light rounded-pill d-inline-flex align-items-center gap-2"
          >
            <i class="bi bi-arrow-left"></i>
            <span>Volver al Inicio</span>
          </a>
        </div>
      </nav>
    </header>

    <main class="container mt-5 text-center min-vh-100">
      <div class="bg-white bg-opacity-75 p-5 rounded-4 shadow-sm">
        <p class="text-muted">
          Referencia: <span id="referencia">Puerto Montt</span>
        </p>
        <h2 id="ciudad" class="display-5 fw-bold"></h2>
        <h3 id="temp" class="display-6 text-primary"></h3>
        <p id="estado" class="lead font-italic"></p>

        <div class="row mt-4 justify-content-center">
          <div class="col-md-3">
            <p class="fw-bold mb-0">💧 Humedad</p>
            <p id="humedad">--%</p>
          </div>
          <div class="col-md-3">
            <p class="fw-bold mb-0">💨 Viento</p>
            <p id="viento">-- km/h</p>
          </div>
        </div>

        <h4 class="mt-5 mb-4">Pronóstico semanal</h4>
        <div class="row justify-content-center">
          <div class="col-md-8">
            <ul
              class="list-group list-group-flush shadow-sm rounded"
              id="lista"
            ></ul>
          </div>
        </div>
      </div>
    </main>

    <footer class="main-footer text-white text-center p-4 mt-5">
      <div class="container">
        <p class="main-footer__text mb-0">
          © 2026 Clima360 🌤️ | Desarrollado por Pilar Casanova ☁️
        </p>
        <small class="text-white-50">Portafolio Front-End - Bootcamp</small>
      </div>
    </footer>
    <script src="./assets/js/script.js"></script>
  </body>
</html>
